services:

  # ── MariaDB ───────────────────────────────────────────────
  db:
    image: mariadb:10.11
    container_name: bssm_db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: bssm_meal
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: bssm_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot Backend ───────────────────────────────────
  backend:
    build: ../BSSMMEALALERT_bakcend
    container_name: bssm_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # DB
      SPRING_DATASOURCE_URL: jdbc:mariadb://db:3306/bssm_meal?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.mariadb.jdbc.Driver
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MariaDBDialect

      # Redis
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWOR`D: ${REDIS_PASSWORD}

      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_CLIENT_ID: ${JWT_CLIENT_ID}
      JWT_ACCESS_EXPIRE_MILLIS: ${JWT_ACCESS_EXPIRE_MILLIS:-3600000}
      JWT_REFRESH_EXPIRE_MILLIS: ${JWT_REFRESH_EXPIRE_MILLIS:-2592000000}

      # Mail
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD}

      # Google OAuth
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}

      # Firebase 키 파일 경로 (컨테이너 내부 경로)
      FIREBASE_CREDENTIALS_PATH: /run/secrets/firebase-key

      TZ: Asia/Seoul
    volumes:
      - uploads_data:/app/uploads
      # Firebase 키: Pi 로컬에 파일 두고 마운트
      - ${FIREBASE_KEY_PATH:-./secrets/firebase-service-account.json}:/run/secrets/firebase-key:ro

  # ── React Frontend (현재 디렉토리 = BSSM-Menu-Alert 레포 루트)
  frontend:
    build: .
    container_name: bssm_frontend
    restart: unless-stopped

  # ── Nginx Reverse Proxy ───────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: bssm_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  db_data:
  redis_data:
  uploads_data:
