<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입을 환영합니다</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .header {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
        }
        .content {
            padding: 40px 30px;
        }
        .feature-box {
            background: #f8f9fa;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
        }
        .feature-item {
            padding: 10px 0;
            display: flex;
            align-items: center;
        }
        .feature-icon {
            font-size: 20px;
            margin-right: 10px;
        }
        .footer {
            background: #f8f9fa;
            padding: 20px 30px;
            text-align: center;
            color: #868e96;
            font-size: 14px;
        }
        .logo {
            font-size: 32px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🎉</div>
            <h1>회원가입을 환영합니다!</h1>
        </div>
        <div class="content">
            <p style="font-size: 18px; color: #212529; line-height: 1.6;">
                안녕하세요, <strong>홍길동</strong>님!
            </p>
            <p style="color: #495057; line-height: 1.6;">
                <strong>BSSM 급식알리미</strong> 서비스에 가입해 주셔서 진심으로 감사합니다.<br>
                이제 매일매일 맛있는 급식 정보를 편하게 받아보실 수 있습니다.
            </p>
            
            <div class="feature-box">
                <h3 style="margin: 0 0 15px 0; color: #212529;">✨ 서비스 주요 기능</h3>
                <div class="feature-item">
                    <span class="feature-icon">🍱</span>
                    <span>등록된 급식 메뉴 확인</span>
                </div>
                <div class="feature-item">
                    <span class="feature-icon">❤️</span>
                    <span>선호 메뉴 설정 및 알림</span>
                </div>
                <div class="feature-item">
                    <span class="feature-icon">🚫</span>
                    <span>알레르기 설정 및 알림</span>
                </div>
            </div>
            
            <p style="color: #495057; line-height: 1.6; font-size: 14px;">
                서비스 이용 중 불편한 점이 있다면 언제든 문의해 주세요.<br>
                감사합니다.
            </p>
        </div>
        <div class="footer">
            <p style="margin: 0;"><strong>BSSM 급식알리미</strong> 운영팀</p>
            <p style="margin: 5px 0 0 0; font-size: 12px;">이 메일은 발신 전용입니다.</p>
        </div>
    </div>
</body>
</html>
