<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>계정 이용 제한 해제</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .header {
            background: linear-gradient(135deg, #0ca678 0%, #099268 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
        }
        .content {
            padding: 40px 30px;
        }
        .success-box {
            background: #e6fcf5;
            border-left: 4px solid #0ca678;
            padding: 20px;
            margin: 20px 0;
            border-radius: 4px;
            text-align: center;
        }
        .footer {
            background: #f8f9fa;
            padding: 20px 30px;
            text-align: center;
            color: #868e96;
            font-size: 14px;
        }
        .logo {
            font-size: 32px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">✅</div>
            <h1>계정 이용 제한 해제</h1>
        </div>
        <div class="content">
            <p style="font-size: 16px; color: #212529; line-height: 1.6;">
                안녕하세요. <strong>BSSM 급식알리미</strong> 운영팀입니다.
            </p>
            
            <div class="success-box">
                <p style="margin: 0; font-size: 18px; font-weight: 600; color: #0ca678;">
                    귀하의 계정 이용 제한이 해제되었습니다.
                </p>
            </div>
            
            <p style="color: #495057; line-height: 1.6;">
                이제 정상적으로 모든 서비스를 이용하실 수 있습니다.<br>
                기다려주셔서 감사합니다.
            </p>
            <p style="color: #495057; line-height: 1.6; font-size: 14px;">
                앞으로 더욱 쾌적한 서비스를 위해 노력하겠습니다.
            </p>
        </div>
        <div class="footer">
            <p style="margin: 0;"><strong>BSSM 급식알리미</strong> 운영팀</p>
            <p style="margin: 5px 0 0 0; font-size: 12px;">이 메일은 발신 전용입니다.</p>
        </div>
    </div>
</body>
</html>
