<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>신고 처리 결과 안내</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .header {
            background: linear-gradient(135deg, #4c6ef5 0%, #3b5bdb 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
        }
        .content {
            padding: 40px 30px;
        }
        .info-box {
            background: #f8f9fa;
            border-left: 4px solid #4c6ef5;
            padding: 20px;
            margin: 20px 0;
            border-radius: 4px;
        }
        .footer {
            background: #f8f9fa;
            padding: 20px 30px;
            text-align: center;
            color: #868e96;
            font-size: 14px;
        }
        .logo {
            font-size: 32px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">📌</div>
            <h1>신고 처리 결과 안내</h1>
        </div>
        <div class="content">
            <p style="font-size: 16px; color: #212529; line-height: 1.6;">
                안녕하세요. <strong>BSSM 급식알리미</strong> 운영팀입니다.
            </p>
            <p style="color: #495057; line-height: 1.6;">
                귀하께서 접수하신 신고 건의 처리 결과입니다.
            </p>
            
            <div class="info-box">
                <p style="margin: 0 0 10px 0; font-weight: 600; color: #212529;">
                    처리 상태: ✅ 해결(승인)
                </p>
                <p style="margin: 0; color: #495057; line-height: 1.6;">
                    해당 게시글은 커뮤니티 가이드라인 위반으로 확인되어 삭제 조치되었습니다. 
                    신고해 주셔서 감사합니다. 앞으로도 건전한 커뮤니티 문화 조성을 위해 노력하겠습니다.
                </p>
            </div>
            
            <p style="color: #495057; line-height: 1.6; font-size: 14px;">
                항상 서비스를 이용해 주셔서 감사합니다.
            </p>
        </div>
        <div class="footer">
            <p style="margin: 0;"><strong>BSSM 급식알리미</strong> 운영팀</p>
            <p style="margin: 5px 0 0 0; font-size: 12px;">이 메일은 발신 전용입니다.</p>
        </div>
    </div>
</body>
</html>
