<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>계정 이용 제한 안내</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: #f5f5f5;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .header {
            background: linear-gradient(135deg, #fa5252 0%, #e03131 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
        }
        .content {
            padding: 40px 30px;
        }
        .warning-box {
            background: #fff5f5;
            border-left: 4px solid #fa5252;
            padding: 20px;
            margin: 20px 0;
            border-radius: 4px;
        }
        .info-row {
            display: flex;
            padding: 12px 0;
            border-bottom: 1px solid #e9ecef;
        }
        .info-row:last-child {
            border-bottom: none;
        }
        .info-label {
            font-weight: 600;
            color: #495057;
            min-width: 100px;
        }
        .info-value {
            color: #212529;
        }
        .footer {
            background: #f8f9fa;
            padding: 20px 30px;
            text-align: center;
            color: #868e96;
            font-size: 14px;
        }
        .logo {
            font-size: 32px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🚫</div>
            <h1>계정 이용 제한 안내</h1>
        </div>
        <div class="content">
            <p style="font-size: 16px; color: #212529; line-height: 1.6;">
                안녕하세요. <strong>BSSM 급식알리미</strong> 운영팀입니다.
            </p>
            <p style="color: #495057; line-height: 1.6;">
                귀하의 계정 활동 중 서비스 운영 정책 위반이 확인되어<br>
                아래와 같이 이용 제한 조치가 취해졌음을 알려드립니다.
            </p>
            
            <div class="warning-box">
                <div class="info-row">
                    <div class="info-label">제한 사유</div>
                    <div class="info-value">운영 정책 위반</div>
                </div>
                <div class="info-row">
                    <div class="info-label">제한 기간</div>
                    <div class="info-value">2026년 02월 26일 19시 30분 까지</div>
                </div>
            </div>
            
            <p style="color: #495057; line-height: 1.6; font-size: 14px;">
                제한 기간이 종료되면 자동으로 서비스 이용이 가능해집니다.<br>
                본 조치에 대해 문의사항이 있으시면 관리자 메일로 연락 부탁드립니다.
            </p>
        </div>
        <div class="footer">
            <p style="margin: 0;"><strong>BSSM 급식알리미</strong> 운영팀</p>
            <p style="margin: 5px 0 0 0; font-size: 12px;">이 메일은 발신 전용입니다.</p>
        </div>
    </div>
</body>
</html>
