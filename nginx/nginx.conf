# ── 프론트엔드 (imjemin.co.kr) ──────────────────────────────
server {
    listen 80;
    server_name imjemin.co.kr www.imjemin.co.kr;

    # Cloudflare 실제 IP 복원
    real_ip_header CF-Connecting-IP;

    location / {
        proxy_pass         http://frontend:80;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # XSS 방어
        add_header X-Content-Type-Options   "nosniff" always;
        add_header X-Frame-Options          "SAMEORIGIN" always;
        add_header X-XSS-Protection         "1; mode=block" always;
        add_header Content-Security-Policy  "default-src 'self'; script-src 'self' 'unsafe-inline' https://accounts.google.com https://apis.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.imjemin.co.kr https://fcm.googleapis.com https://firebaseinstallations.googleapis.com; frame-src https://accounts.google.com;" always;
    }
}

# ── 백엔드 API (api.imjemin.co.kr) ──────────────────────────
server {
    listen 80;
    server_name api.imjemin.co.kr;

    real_ip_header CF-Connecting-IP;

    # 파일 업로드 크기 제한
    client_max_body_size 100M;

    # SSE (Server-Sent Events) 타임아웃 해제
    proxy_read_timeout    3600s;
    proxy_send_timeout    3600s;

    location / {
        proxy_pass         http://backend:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;

        # SSE 지원
        proxy_buffering    off;
        proxy_cache        off;
    }
}
